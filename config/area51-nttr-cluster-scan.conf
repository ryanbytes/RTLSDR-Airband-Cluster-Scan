# Area 51 / NTTR clustered scan example.
# Frequencies are public scanner examples from Dreamland Resort's NTTR and
# Area 51 scanner list, last checked 2026-06-26. Verify current assignments
# before operational use:
# https://www.dreamlandresort.com/info/scanner.html

devices:
({
  type = "rtlsdr";
  index = 0;
  gain = 25;
  correction = 0;
  mode = "cluster_scan";
  sample_rate = 2400000;
  edge_guard_hz = 150000;
  cluster_hang_time_ms = 500;
  prefer_more_channels_per_cluster = true;

  channels:
  (
    {
      modulation = "am";
      squelch_snr_threshold = 18.0;
      freq = 118.300;
      label = "Creech AFB Tower / SFA";
      outputs: ( { type = "file"; directory = "/tmp/rtl_airband/area51-example"; filename_template = "creech-tower"; split_on_transmission = true; include_freq = true; append = false; } );
    },
    {
      modulation = "am";
      squelch_snr_threshold = 18.0;
      freq = 118.700;
      label = "KLAS Janet Ops";
      outputs: ( { type = "file"; directory = "/tmp/rtl_airband/area51-example"; filename_template = "janet-ops"; split_on_transmission = true; include_freq = true; append = false; } );
    },
    {
      modulation = "am";
      squelch_snr_threshold = 18.0;
      freq = 119.350;
      label = "Nellis Control West";
      outputs: ( { type = "file"; directory = "/tmp/rtl_airband/area51-example"; filename_template = "nellis-control-west"; split_on_transmission = true; include_freq = true; append = false; } );
    },
    {
      modulation = "am";
      squelch_snr_threshold = 18.0;
      freq = 119.450;
      label = "TTR Base Ops";
      outputs: ( { type = "file"; directory = "/tmp/rtl_airband/area51-example"; filename_template = "ttr-base-ops"; split_on_transmission = true; include_freq = true; append = false; } );
    },
    {
      modulation = "am";
      squelch_snr_threshold = 18.0;
      freq = 123.225;
