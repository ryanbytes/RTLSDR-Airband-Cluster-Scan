      squelch_snr_threshold = 18.0;
      freq = 123.550;
      label = "Nellis Range Controller";
      outputs: ( { type = "file"; directory = "/tmp/rtl_airband/area51-example"; filename_template = "nellis-range-controller"; split_on_transmission = true; include_freq = true; append = false; } );
