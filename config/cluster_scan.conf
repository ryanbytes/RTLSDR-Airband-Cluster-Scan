# Clustered scan mode example.
# Frequencies are configured as normal multichannel channels. RTLSDR-Airband
# groups nearby frequencies into RF clusters, tunes once per cluster, and
# demodulates every channel inside the active passband.

devices:
({
  type = "rtlsdr";
  index = 0;
  gain = 25;
  correction = 80;
  mode = "cluster_scan";
  sample_rate = 2400000;
  edge_guard_hz = 150000;
  cluster_hang_time_ms = 500;
  prefer_more_channels_per_cluster = true;
  channels:
  (
    {
      freq = 118.15;
      label = "Tower";
      outputs: (
        {
          type = "file";
          directory = "/home/pi/recordings";
          filename_template = "Tower";
        }
      );
    },
    {
      freq = 118.35;
      label = "Ground";
      outputs: (
        {
          type = "file";
          directory = "/home/pi/recordings";
          filename_template = "Ground";
        }
      );
    },
    {
      freq = 124.7;
      label = "Approach";
      outputs: (
        {
          type = "file";
          directory = "/home/pi/recordings";
          filename_template = "Approach";
        }
      );
    }
  );
 }
);
