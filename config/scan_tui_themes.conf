# Scan TUI color examples. These options are only used by the foreground
# terminal display started with rtl_airband -f.

# Presets:
#   bright        - brighter default; uses green/yellow/cyan status colors
#   high_contrast - stronger white/black/background contrast
#   monochrome    - no color dependence; uses brightness, underline, inverse
#   deuteranopia  - avoids red/green status distinction
#   protanopia    - avoids red/green status distinction
#   tritanopia    - avoids blue/yellow status dependence
scan_tui_theme = "high_contrast";

# Optional custom ANSI SGR overrides. Values are numeric SGR fragments only,
# without the ESC[ prefix or trailing m.
#
# scan_tui_colors = {
#   title = "1;37;44";
#   header = "1;37";
#   idle_row = "0;37";
#   open_row = "1;32";
#   edge_row = "1;33";
#   afc_row = "1;36";
#   idle_status = "1;30;47";
#   open_status = "1;30;42";
#   edge_status = "1;30;43";
#   afc_status = "1;30;46";
# };

devices:
({
  type = "rtlsdr";
  index = 0;
  gain = 25;
  correction = 80;
  mode = "scan";
  channels:
  (
    {
      freqs = ( 118.15, 124.7, 132.1 );
      labels = ( "Tower", "Ground", "Approach" );
      outputs: (
        {
          type = "file";
          directory = "/tmp/rtl_airband";
          filename_template = "scan-tui-theme";
        }
      );
    }
  );
 }
);
